<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library - Authentication</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .auth-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
        }
        .auth-form input {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .auth-form button {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .auth-form button.google-btn {
            background-color: #4285F4;
        }
        .auth-form .toggle-form {
            text-align: center;
            margin-top: 15px;
        }
        #error-message {
            color: red;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 id="form-title">Login</h2>
        <div id="error-message"></div>
        <form id="auth-form" class="auth-form">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <label id="forgotpasslabel" style="cursor: pointer; text-align: center; margin-bottom: 5px; ">Forgot Password</label>
            <button type="submit" id="submit-btn">Login</button>        </form>
        <div class="toggle-form">
            <p id="toggle-text">Don't have an account? <a href="#" id="toggle-link">Sign Up</a></p>
        </div>
    </div>

    <!-- Firebase SDK Scripts -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            sendPasswordResetEmail,
            onAuthStateChanged
        } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDfz3XGumJd3CO9VOgnVPtAaj5dV1sghjI",
            authDomain: "digital-library-cab20.firebaseapp.com",
            projectId: "digital-library-cab20",
            storageBucket: "digital-library-cab20.appspot.com",
            messagingSenderId: "241363341340",
            appId: "1:241363341340:web:4ab3ada2fcc90d0b1e0fd9",
            measurementId: "G-H71L2WQGZ8"
        };
    
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
    
        // DOM Elements
        const authForm = document.getElementById('auth-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const formTitle = document.getElementById('form-title');
        const errorMessage = document.getElementById('error-message');
        const toggleLink = document.getElementById('toggle-link');
        const toggleText = document.getElementById('toggle-text');
        const forgotPasswordLabel = document.getElementById('forgotpasslabel');
    
        // Toggle between Login and Signup
        let isLoginMode = true;
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            updateFormMode();
        });
    
        function updateFormMode() {
            if (isLoginMode) {
                formTitle.textContent = 'Login';
                submitBtn.textContent = 'Login';
                toggleText.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-link">Sign Up</a>';
            } else {
                formTitle.textContent = 'Sign Up';
                submitBtn.textContent = 'Sign Up';
                toggleText.innerHTML = 'Already have an account? <a href="#" id="toggle-link">Login</a>';
            }
            // Reattach event listener
            document.getElementById('toggle-link').addEventListener('click', (e) => {
                e.preventDefault();
                isLoginMode = !isLoginMode;
                updateFormMode();
            });
        }
    
        // Form Submission
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.textContent = '';
            const email = emailInput.value;
            const password = passwordInput.value;
    
            try {
                if (isLoginMode) {
                    // Login
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // Sign Up
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                // Redirect or handle successful authentication
                window.location.href = 'index.html';
            } catch (error) {
                errorMessage.textContent = getErrorMessage(error);
                console.error('Authentication Error:', error);
            }
        });
    
        // Forgot Password
        forgotPasswordLabel.addEventListener('click', async () => {
            const email = emailInput.value;
    
            if (!email) {
                errorMessage.textContent = 'Please enter your email address first';
                return;
            }
    
            try {
                await sendPasswordResetEmail(auth, email);
                errorMessage.style.color = 'green';
                errorMessage.textContent = 'Password reset email sent! Check your inbox.';
            } catch (error) {
                errorMessage.style.color = 'red';
                errorMessage.textContent = getErrorMessage(error);
                console.error('Password Reset Error:', error);
            }
        });
    
        // Error Message Handling
        function getErrorMessage(error) {
            switch (error.code) {
                case 'auth/invalid-email':
                    return 'Invalid email address. Please check and try again.';
                case 'auth/user-not-found':
                    return 'No account found with this email address.';
                case 'auth/wrong-password':
                    return 'Incorrect password. Please try again.';
                case 'auth/email-already-in-use':
                    return 'Email is already registered. Try logging in instead.';
                case 'auth/weak-password':
                    return 'Password is too weak. Please use a stronger password.';
                default:
                    return 'Authentication failed. Please try again.';
            }
        }
    
        // Authentication State Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, redirect to library
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
